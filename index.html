<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Notáveis – Museu Bajubá</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0a0a0a;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
}

/* ── Stage ── */
#stage {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
}

/* ── World (estático) ── */
#world {
  position: relative;
  flex-shrink: 1;
  min-width: 0;
  min-height: 0;
}

#collage-img {
  display: block;
  max-width:  calc(100vw - 16px);
  max-height: calc(100vh - 16px);
  width: auto;
  height: auto;
  pointer-events: none;
  -webkit-user-drag: none;
  border-radius: 4px;
}

/* ── Hotspots: quadradinho no canto inferior direito de cada célula ── */
.hs {
  position: absolute;
  width: 22px;
  height: 22px;
  border-radius: 4px;
  background: rgba(218, 30, 214, 0.82);
  border: 1.5px solid rgba(255, 255, 255, 0.75);
  color: #fff;
  font-size: 8px;
  font-weight: 800;
  letter-spacing: 0px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  /* âncora no canto inferior direito da célula */
  transform: translate(-100%, -100%);
  z-index: 10;
  animation: hs-pulse 3s ease-in-out infinite;
}

@keyframes hs-pulse {
  0%, 100% {
    box-shadow: 0 0 0 0 rgba(218,30,214,0.5), 0 2px 6px rgba(0,0,0,0.5);
    opacity: 0.85;
  }
  50% {
    box-shadow: 0 0 0 5px rgba(218,30,214,0), 0 0 14px rgba(218,30,214,0.7);
    opacity: 1;
  }
}

.hs:nth-child(3n+1) { animation-delay: 0s; }
.hs:nth-child(3n+2) { animation-delay: -1s; }
.hs:nth-child(3n)   { animation-delay: -2s; }

.hs:hover {
  animation: none;
  background: #da1ed6;
  opacity: 1;
  box-shadow: 0 0 0 4px rgba(218,30,214,0.3), 0 0 18px rgba(218,30,214,0.9);
  transform: translate(-100%, -100%) scale(1.25);
  transition: transform 0.15s, box-shadow 0.15s;
}

.hs.is-open {
  animation: none;
  background: #fff;
  color: #da1ed6;
  border-color: #da1ed6;
  opacity: 1;
  box-shadow: 0 0 0 3px rgba(218,30,214,0.4);
  transform: translate(-100%, -100%) scale(1.15);
}

/* ── Overlay ── */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
#overlay.on { opacity: 1; pointer-events: all; }

/* ── Side Panel ── */
#panel {
  position: fixed;
  top: 0; right: 0;
  width: clamp(280px, 85vw, 390px);
  height: 100%;
  background: #0d0916;
  border-left: 1px solid rgba(218, 30, 214, 0.22);
  box-shadow: -12px 0 48px rgba(0, 0, 0, 0.7);
  z-index: 100;
  transform: translateX(100%);
  transition: transform 0.38s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: rgba(218,30,214,0.3) transparent;
}
#panel.on { transform: translateX(0); }

#panel::before {
  content: '';
  display: block;
  height: 3px;
  background: linear-gradient(90deg, #da1ed6, #7c2ff7, #da1ed6);
  flex-shrink: 0;
}

#panel-top {
  padding: 16px 20px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}

#panel-num {
  font-size: 92px;
  font-weight: 900;
  line-height: 0.85;
  letter-spacing: -6px;
  color: rgba(218, 30, 214, 0.1);
  flex: 1;
  padding-top: 2px;
}

#btn-close {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.12);
  background: rgba(255, 255, 255, 0.04);
  color: rgba(255, 255, 255, 0.55);
  font-size: 22px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 6px;
  transition: background 0.2s, color 0.2s;
}
#btn-close:hover { background: rgba(218, 30, 214, 0.25); color: #fff; }

#panel-body { padding: 4px 26px 52px; }

#panel-name {
  font-size: 26px;
  font-weight: 800;
  color: #da1ed6;
  line-height: 1.2;
  margin-bottom: 14px;
}

#panel-bar {
  width: 38px;
  height: 3px;
  background: linear-gradient(90deg, #da1ed6, #7c2ff7);
  border-radius: 2px;
  margin-bottom: 18px;
}

#panel-desc {
  font-size: 15px;
  line-height: 1.78;
  color: rgba(255, 255, 255, 0.7);
}

/* ── Hint ── */
#hint {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(8px);
  color: rgba(255, 255, 255, 0.65);
  font-size: 13px;
  padding: 8px 20px;
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.08);
  z-index: 30;
  pointer-events: none;
  white-space: nowrap;
  transition: opacity 0.7s ease;
}
</style>
</head>
<body>

<div id="stage">
  <div id="world">
    <img id="collage-img" src="collage.webp" alt="Notáveis Bajubá" draggable="false">
  </div>
</div>

<div id="overlay"></div>

<div id="panel">
  <div id="panel-top">
    <div id="panel-num">01</div>
    <button id="btn-close" aria-label="Fechar">&#215;</button>
  </div>
  <div id="panel-body">
    <div id="panel-name">Nome</div>
    <div id="panel-bar"></div>
    <div id="panel-desc"></div>
  </div>
</div>

<div id="hint">Toque em uma pessoa para saber mais</div>

<script>
(function () {
'use strict';

// x, y = canto inferior direito de cada célula (% sobre a imagem)
var PESSOAS = [
  // Linha 1 — 4 colunas iguais
  { n:1,  nome:'Maria de Kalú',        x:23,   y:20   },
  { n:2,  nome:'Leci Brandão',         x:48,   y:20   },
  { n:3,  nome:'Marta (jogadora)',     x:74,   y:20   },
  { n:4,  nome:'Joanna (cantora)',     x:97,   y:20   },
  // Linha 2 — 3 colunas (col.4 = foto do olho, sem hotspot)
  { n:5,  nome:'Roberta Miranda',      x:23,   y:41   },
  { n:6,  nome:'Daniela Mercury',      x:48,   y:41   },
  { n:7,  nome:'Rosely Roth',          x:74,   y:41   },
  // Bloco central direito — 8,9 em cima / 10,11 embaixo
  { n:8,  nome:'Cassandra Rios',       x:78,   y:55   },
  { n:9,  nome:'Fátima Bezerra',       x:97,   y:55   },
  { n:10, nome:'Lacraia',              x:78,   y:68   },
  { n:11, nome:'Edy Star',             x:97,   y:68   },
  // Linha 4 — 4 colunas
  { n:12, nome:'Luana Barbosa',        x:23,   y:83   },
  { n:13, nome:'Alexandre Ivo Rajão',  x:48,   y:83   },
  { n:14, nome:'Lucas Fortuna',        x:74,   y:83   },
  { n:15, nome:'Osvaldo Nunes',        x:97,   y:83   },
  // Linha 5 — 5 colunas
  { n:16, nome:'Clóvis Bornay',        x:20,   y:97   },
  { n:17, nome:'Joaozinho Trinta',     x:38,   y:97   },
  { n:18, nome:'Joaosinho da Goméia',  x:58,   y:97   },
  { n:19, nome:'Cláudia Celeste',      x:77,   y:97   },
  { n:20, nome:'Lorna Washington',     x:90,   y:97   },
  // Meio esquerdo — coluna 1 do bloco central
  { n:21, nome:'Geórgia Bengston',     x:23,   y:68   },
];

var LOREM = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.';

var world    = document.getElementById('world');
var img      = document.getElementById('collage-img');
var overlay  = document.getElementById('overlay');
var panel    = document.getElementById('panel');
var panelNum = document.getElementById('panel-num');
var panelNom = document.getElementById('panel-name');
var panelDes = document.getElementById('panel-desc');
var btnClose = document.getElementById('btn-close');
var hint     = document.getElementById('hint');

// ── Hotspots ──
var activeEl = null;

PESSOAS.forEach(function (p) {
  var el = document.createElement('div');
  el.className = 'hs';
  el.textContent = String(p.n).padStart(2, '0');
  el.style.left = p.x + '%';
  el.style.top  = p.y + '%';
  el.setAttribute('title', p.nome);
  el.addEventListener('click', function (e) {
    e.stopPropagation();
    openPanel(p, el);
  });
  world.appendChild(el);
});

// ── Panel ──
function openPanel(p, el) {
  if (activeEl) activeEl.classList.remove('is-open');
  activeEl = el;
  el.classList.add('is-open');
  panelNum.textContent = String(p.n).padStart(2, '0');
  panelNom.textContent = p.nome;
  panelDes.textContent = LOREM;
  panel.scrollTop = 0;
  panel.classList.add('on');
  overlay.classList.add('on');
  hint.style.opacity = '0';
}

function closePanel() {
  panel.classList.remove('on');
  overlay.classList.remove('on');
  if (activeEl) { activeEl.classList.remove('is-open'); activeEl = null; }
}

btnClose.addEventListener('click', closePanel);
overlay.addEventListener('click', closePanel);
document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape') closePanel();
});

// ── Sizing: controlado por CSS (max-width/max-height) ──

// ── Hint ──
setTimeout(function () { hint.style.opacity = '0'; }, 4500);

})();
</script>
</body>
</html>
